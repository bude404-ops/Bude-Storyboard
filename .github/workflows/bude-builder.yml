name: BudE Genesis And Update System

on:

  workflow_dispatch:

  push:
    branches:
      - main


permissions:
  contents: write


jobs:

  bude-build:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"


    - name: Run Genesis Seed
      run: |
        python seed.py


    - name: Run Update Manager
      run: |
        python bude-engine/update_manager.py


    - name: Verify Dashboard
      run: |
        test -f dashboard/index.html
        echo "Dashboard verified"


    - name: Save Updates
      run: |

        git config --global user.name "BudE Builder"

        git config --global user.email "actions@github.com"

        git add .

        git commit -m "BudE Automated Update" || echo "No changes"

        git push || echo "Nothing to push"
