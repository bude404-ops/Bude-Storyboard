name: BudE Genesis Builder

on:
  workflow_dispatch:

  push:
    branches:
      - main


permissions:
  contents: write


jobs:

  build-bude:

    name: Build BudE StoryBoard AI Genesis

    runs-on: ubuntu-latest


    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Verify Genesis Files
        run: |
          echo "Checking required files..."

          test -f seed.py
          test -f blueprint.json

          echo "Genesis files found"


      - name: Validate Blueprint
        run: |
          python -m json.tool blueprint.json > /dev/null

          echo "Blueprint validation complete"


      - name: Run BudE Seed Builder
        run: |
          python seed.py


      - name: Display Generated Files
        run: |
          echo "Generated BudE Structure:"
          find . -maxdepth 3 -type f | sort


      - name: Verify BudE System
        run: |
          echo "Checking generated folders..."

          test -d dashboard
          test -d bude-engine
          test -d modules
          test -d projects
          test -d assets
          test -d updates

          echo "BudE structure verified"


      - name: Test BudE Engine
        run: |
          if [ -f bude-engine/engine.py ]; then
            python bude-engine/engine.py
          else
            echo "Engine file not found"
          fi


      - name: Commit Generated Files
        run: |

          git config --global user.name "BudE Builder"

          git config --global user.email "actions@github.com"


          git add .


          git commit -m "BudE Genesis Generated Build" || echo "No changes to commit"


          git push || echo "Nothing to push"


      - name: Build Complete
        run: |
          echo "================================="
          echo " BudE StoryBoard AI Genesis v0.1 "
          echo " Build Complete"
          echo "================================="
