name: BudE StoryBoard AI Update System

on:

  workflow_dispatch:

  push:
    paths:
      - "updates/**"


permissions:
  contents: write


jobs:

  update-system:

    name: Execute Evolution Updates

    runs-on: ubuntu-latest


    steps:


    - name: Checkout Repository
      uses: actions/checkout@v4


    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20


    - name: Check Project Type
      run: |

        if [ -f package.json ]; then
          echo "Node project detected"
          npm install
        else
          echo "Foundation stage - skipping npm install"
        fi



    - name: Run Update Engine
      run: |

        node updates/update-engine.js



    - name: Validate System
      run: |

        test -f versions.json
        test -d src
        test -d updates

        echo "Validation complete"



    - name: Run Tests
      run: |

        if [ -f package.json ]; then
          npm test || echo "No tests configured"
        else
          echo "No npm project yet"
        fi



    - name: Commit Evolution

      run: |

        git config user.name "BudE Evolution Bot"
        git config user.email "actions@github.com"

        git add .

        git commit -m "BudE system evolution update" || echo "No changes"

        git push
