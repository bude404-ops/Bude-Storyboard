name: BudE StoryBoard AI Genesis Build

on:
  workflow_dispatch:

permissions:
  contents: write


jobs:

  genesis:

    name: Create Foundation From Genesis Seed

    runs-on: ubuntu-latest


    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4


    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20


    - name: Check Genesis Status
      id: check
      run: |

        if [ -f versions.json ]; then

          COMPLETE=$(node -e "
          const v=require('./versions.json');
          console.log(v.seedComplete);
          ")

          if [ "$COMPLETE" = "true" ]; then
            echo "Genesis already completed."
            exit 1
          fi

        fi


    - name: Run Genesis Seed
      run: |

        node seed/bude-genesis-seed.js


    - name: Validate Foundation
      run: |

        test -d src
        test -d updates
        test -d docs
        test -f versions.json

        echo "Foundation validated."


    - name: Commit Genesis Foundation
      run: |

        git config user.name "BudE Genesis Bot"
        git config user.email "actions@github.com"

        git add .

        git commit -m "Initialize BudE StoryBoard AI Genesis Foundation" || echo "Nothing to commit"

        git push
