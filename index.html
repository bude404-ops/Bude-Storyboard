<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BUDE Storyboard v2</title>

<style>
:root{
  --bg:#000;--s:#121212;--s2:#1e1e1e;--b:#2f3336;
  --t:#fff;--t2:#9aa4ad;--a:#1da1f2;--g:#17bf63;--r:#e0245e;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:var(--bg);color:var(--t);padding-bottom:80px}
header{position:sticky;top:0;background:#000d;border-bottom:1px solid var(--b);padding:12px;display:flex;justify-content:space-between}
.tabs{display:flex;overflow:auto;background:var(--s)}
.tab{flex:1;padding:12px;text-align:center;color:var(--t2)}
.tab.active{color:var(--a);border-bottom:2px solid var(--a)}
.section{display:none;padding:12px}
.section.active{display:block}
.card{background:var(--s);padding:12px;border:1px solid var(--b);border-radius:12px;margin-bottom:10px}
input,textarea,select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--b);background:var(--s2);color:var(--t)}
button{width:100%;padding:10px;border:0;border-radius:10px;margin-top:8px}
.btn{background:var(--a);color:#fff}
.small{background:transparent;border:1px solid var(--b);color:var(--t2)}
.danger{background:var(--r);color:#fff}
.row{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;background:#222;padding:3px 6px;border-radius:8px;color:var(--t2)}
.char{display:flex;gap:10px;align-items:center}
.avatar{width:55px;height:55px;border-radius:12px;background:#222;overflow:hidden;display:flex;align-items:center;justify-content:center}
.avatar img{width:100%;height:100%;object-fit:cover}
.imgs{display:flex;gap:6px;overflow:auto;margin-top:6px}
.imgs img{width:60px;height:60px;border-radius:8px;object-fit:cover}
.modal{position:fixed;inset:0;background:#000d;display:none;align-items:center;justify-content:center}
.modal img{max-width:90%;max-height:80%}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#222;padding:10px;border-radius:10px;opacity:0;transition:.3s}
.toast.show{opacity:1}
</style>
</head>

<body>

<header>
  <b>BUDE v2</b>
  <span id="count"></span>
</header>

<div class="tabs">
  <div class="tab active" onclick="tab('c')">Chars</div>
  <div class="tab" onclick="tab('e')">Episodes</div>
  <div class="tab" onclick="tab('x')">Export</div>
</div>

<!-- CHARACTERS -->
<div class="section active" id="c">

<div class="card">
<input id="n" placeholder="Name">
<select id="r">
<option value="lead">Lead</option>
<option value="support">Support</option>
<option value="bg">BG</option>
</select>
<textarea id="d" placeholder="Description"></textarea>
<input id="s" placeholder="Skills comma separated">
<input type="file" id="img" multiple accept="image/*">
<button class="btn" onclick="addChar()">Add Character</button>
</div>

<div id="clist"></div>
</div>

<!-- EPISODES -->
<div class="section" id="e">

<div class="card">
<input id="et" placeholder="Episode title">
<textarea id="es" placeholder="Synopsis"></textarea>
<button class="btn" onclick="addEp()">Add Episode</button>
</div>

<div id="elist"></div>
</div>

<!-- EXPORT -->
<div class="section" id="x">
<div class="card">
<button class="btn" onclick="exp()">Export JSON</button>
<button class="small" onclick="copy()">Copy Text</button>
<button class="danger" onclick="reset()">Reset</button>
</div>
</div>

<div class="toast" id="t"></div>
<div class="modal" id="m" onclick="this.style.display='none'"><img id="mi"></div>

<script>
let db = JSON.parse(localStorage.getItem("bude2")||'{"c":[],"e":[],"id":1}');

function save(){localStorage.setItem("bude2",JSON.stringify(db));ui();toast("Saved");}

function tab(x){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(x).classList.add('active');
event.target.classList.add('active');
}

function compress(file,cb){
let r=new FileReader();
r.onload=e=>{
let img=new Image();
img.onload=()=>{
let c=document.createElement("canvas");
let w=400;
let h=img.height*(w/img.width);
c.width=w;c.height=h;
c.getContext("2d").drawImage(img,0,0,w,h);
cb(c.toDataURL("image/jpeg",0.7));
};
img.src=e.target.result;
};
r.readAsDataURL(file);
}

function addChar(){
let files=[...document.getElementById('img').files];
let imgs=[];
let done=0;

files.forEach(f=>{
compress(f,d=>{
imgs.push(d);
done++;
if(done===files.length) finish();
});
});

if(files.length===0) finish();

function finish(){
db.c.push({
id:db.id++,
n:n.value,
r:r.value,
d:d.value,
s:s.value.split(',').map(x=>x.trim()).filter(x=>x),
i:imgs
});
save();
}
}

function addEp(){
db.e.push({id:db.id++,t:et.value,s:es.value});
save();
}

function ui(){
count.textContent=db.c.length+" chars";

clist.innerHTML=db.c.map(c=>`
<div class="card">
<div class="char">
<div class="avatar" onclick="view('${c.i[0]||''}')">
${c.i[0]?`<img src="${c.i[0]}">`:""}
</div>
<div>
<b>${c.n}</b><br>
<small>${c.r}</small>
<div class="row">${(c.s||[]).map(x=>`<span class='tag'>${x}</span>`).join('')}</div>
</div>
</div>

<div class="imgs">
${(c.i||[]).map(i=>`<img src="${i}" onclick="view('${i}')">`).join('')}
</div>
</div>
`).join('');

elist.innerHTML=db.e.map(e=>`
<div class="card">
<b>${e.t}</b>
<p style="color:#aaa">${e.s}</p>
</div>
`).join('');
}

function view(i){
if(!i) return;
m.style.display='flex';
mi.src=i;
}

function exp(){
prompt("JSON",JSON.stringify(db));
}

function copy(){
navigator.clipboard.writeText(JSON.stringify(db));
toast("Copied");
}

function reset(){
if(confirm("Reset?")){db={c:[],e:[],id:1};save();}
}

function toast(m){
t.textContent=m;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),1200);
}

ui();
</script>

</body>
</html>
