<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cartoon Story Board Pro</title>
    <style>
        body { font-family: sans-serif; background: #0f0f1a; color: #eee; padding: 15px; }
        .card { background: #1a1a2e; padding: 10px; margin: 5px 0; border-left: 4px solid #00d4ff; border-radius: 4px; }
        button { background: #00d4ff; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; margin-top: 5px; cursor: pointer; }
        .ep-card { background: #252545; border: 2px solid #00d4ff; padding: 15px; margin: 10px 0; border-radius: 10px; }
    </style>
</head>
<body>
    <h2>🎬 Cartoon Story Board Pro</h2>
    
    <input type="text" id="name" placeholder="Lead Character Name" style="width:90%; padding:10px;">
    <button onclick="addLead()">+ Add Lead Character</button>
    
    <h3>Episode Generation</h3>
    <input type="text" id="theme" placeholder="Adventure Theme...">
    <button onclick="generateEpisode()" style="background:#4caf50; color:#fff;">Generate Episode with Extras</button>

    <h3>Saved Episodes</h3>
    <div id="epList"></div>

    <script>
        let chars = JSON.parse(localStorage.getItem('story_chars') || '[]');
        let eps = JSON.parse(localStorage.getItem('story_eps') || '[]');
        const quirks = ["juggling", "wearing a giant hat", "walking a pet rock", "flying a kite", "dancing", "eating a giant sandwich"];

        function addLead() {
            chars.push({ name: document.getElementById('name').value, isBg: false });
            update();
        }

        function generateEpisode() {
            let leads = chars.filter(c => !c.isBg);
            if(leads.length === 0) return alert("Add at least one lead character!");

            // Pick lead
            let lead = leads[Math.floor(Math.random() * leads.length)];
            
            // Auto-generate/fill 2 background characters if needed
            let bgChars = [];
            for (let i = 0; i < 2; i++) {
                let q = quirks[Math.floor(Math.random() * quirks.length)];
                let bg = { name: "Extra " + (chars.length + 1), trait: q, isBg: true };
                chars.push(bg);
                bgChars.push(bg);
            }

            const script = `<h4>Episode: ${document.getElementById('theme').value}</h4>` +
                           `<strong>Lead:</strong> ${lead.name}<br>` +
                           `<strong>Scene Action:</strong> ${lead.name} explores while ` +
                           `${bgChars[0].name} is busy ${bgChars[0].trait} and ` +
                           `${bgChars[1].name} is ${bgChars[1].trait}.`;
            
            eps.push(script);
            localStorage.setItem('story_chars', JSON.stringify(chars));
            localStorage.setItem('story_eps', JSON.stringify(eps));
            render();
        }

        function render() {
            document.getElementById('epList').innerHTML = eps.map(e => `<div class="ep-card">${e}</div>`).join('');
        }
        render();
    </script>
</body>
</html>
