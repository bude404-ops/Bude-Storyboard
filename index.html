<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BUDE Flow Intel V11</title>

<style>
:root{
  --bg:#0b0f19;
  --card:#111827;
  --txt:#e5e7eb;
  --muted:#94a3b8;
  --acc:#00d4aa;
  --bad:#ef4444;
  --warn:#f59e0b;
  --line:#1f2937;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--txt);
  font-family:system-ui;
  padding:12px;
}

h1{
  text-align:center;
  font-size:1.1rem;
  color:var(--acc);
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  margin-top:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid var(--line);
  background:#0b0f19;
  color:var(--txt);
}

button{
  background:var(--acc);
  font-weight:700;
  color:#000;
}

.small{font-size:.75rem;color:var(--muted)}
.row{display:flex;justify-content:space-between;font-size:.85rem;margin:4px 0}
.hidden{display:none}
.tag{font-size:.65rem;padding:2px 6px;background:#1f2937;border-radius:6px}
.bad{color:var(--bad)}
.warn{color:var(--warn)}
.ok{color:var(--acc)}
</style>
</head>

<body>

<h1>🧠 BUDE FLOW INTEL V11</h1>

<div class="card">
  <input id="ca" placeholder="Solana Token Address">
  <button onclick="run()">Analyze Flow</button>
</div>

<div class="card hidden" id="token"></div>
<div class="card hidden" id="intel"></div>
<div class="card hidden" id="airdrop"></div>
<div class="card hidden" id="wallet"></div>

<script>

const RPC="https://api.mainnet-beta.solana.com";

let STATE={
  holders:[],
  transfers:[],
  wallets:{}
};

/* ---------------- RPC ---------------- */

async function rpc(body){
  return fetch(RPC,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  }).then(r=>r.json());
}

/* ---------------- TOKEN ---------------- */

async function getSupply(ca){
  const j=await rpc({
    jsonrpc:"2.0",id:1,
    method:"getTokenSupply",
    params:[ca]
  });
  return j?.result?.value;
}

async function getHolders(ca){
  const j=await rpc({
    jsonrpc:"2.0",id:1,
    method:"getTokenLargestAccounts",
    params:[ca]
  });
  return j?.result?.value||[];
}

/* ---------------- FLOW ENGINE ---------------- */

async function getTxs(wallet,limit=20){
  const j=await rpc({
    jsonrpc:"2.0",id:1,
    method:"getSignaturesForAddress",
    params:[wallet,{limit}]
  });
  return j?.result||[];
}

async function getTx(sig){
  const j=await rpc({
    jsonrpc:"2.0",id:1,
    method:"getTransaction",
    params:[sig,{encoding:"json"}]
  });
  return j?.result;
}

/* ---------------- MAIN ---------------- */

async function run(){

  const ca=document.getElementById("ca").value.trim();
  if(!ca) return;

  const supplyData=await getSupply(ca);
  const supply=supplyData?.uiAmount||0;

  const holdersRaw=await getHolders(ca);

  const holders=holdersRaw.map(h=>({
    address:h.address,
    amount:h.amount,
    pct:supply?(h.amount/supply)*100:0
  }));

  STATE.holders=holders;

  analyzeWalletBehavior(holders);

  renderToken(supply,holders);
  renderIntel(holders);

  await buildAirdropMap(holders.slice(0,5));
}

/* ---------------- BEHAVIOR ---------------- */

function analyzeWalletBehavior(h){

  STATE.wallets={};

  h.forEach((w,i)=>{

    let type="RETAIL";

    if(w.pct>30) type="WHALE_ACCUMULATOR";
    else if(w.pct>10) type="DISTRIBUTOR";
    else if(i<3) type="EARLY_CONTROL";

    STATE.wallets[w.address]=type;
  });
}

/* ---------------- AIRDROP ENGINE ---------------- */

async function buildAirdropMap(wallets){

  const airdrops=[];
  const seen=new Map();

  for(const w of wallets){

    const txs=await getTxs(w.address,10);

    for(const t of txs){

      const tx=await getTx(t.signature);
      if(!tx) continue;

      const meta=tx.meta;
      const pre=meta?.preBalances||[];
      const post=meta?.postBalances||[];

      const keys=tx.transaction.message.accountKeys;

      const idx=keys.indexOf(w.address);
      if(idx===-1) continue;

      const diff=(post[idx]||0)-(pre[idx]||0);

      if(diff>0){

        const key=t.signature;

        if(!seen.has(key)){
          seen.set(key,true);

          airdrops.push({
            wallet:w.address,
            amount:diff/1e9,
            time:tx.blockTime
          });
        }
      }
    }
  }

  STATE.airdrops=airdrops;

  renderAirdrops(airdrops);
}

/* ---------------- INTEL ENGINE ---------------- */

function renderIntel(h){

  const el=document.getElementById("intel");
  el.classList.remove("hidden");

  const top=h[0]?.pct||0;
  const top5=h.slice(0,5).reduce((a,b)=>a+b.pct,0);

  let score=0;
  let flags=[];

  if(top>45){score+=30;flags.push("SINGLE WALLET CONTROL");}
  if(top5>70){score+=25;flags.push("CLUSTER CONTROL");}
  if(h.length<10){score+=15;flags.push("LOW HOLDERS");}

  const typeCount=Object.values(STATE.wallets);

  const bundlerLike=typeCount.filter(t=>t==="DISTRIBUTOR").length;

  if(bundlerLike>2){
    score+=20;
    flags.push("BUNDLER STRUCTURE DETECTED");
  }

  let label="CLEAN";
  if(score>60) label="HIGH RISK";
  else if(score>30) label="SUSPICIOUS";

  el.innerHTML=`
    <b>🧠 FLOW INTELLIGENCE</b>
    <div class="row"><span>Risk</span><span>${label}</span></div>
    <div class="row"><span>Score</span><span>${score}/100</span></div>
    <div class="small">${flags.join("<br>")||"No anomalies"}</div>
  `;
}

/* ---------------- AIRDROP VIEW ---------------- */

function renderAirdrops(a){

  const el=document.getElementById("airdrop");
  el.classList.remove("hidden");

  if(!a.length){
    el.innerHTML="<b>💸 AIRDROPS</b><div class='small'>No patterns detected</div>";
    return;
  }

  el.innerHTML=`
    <b>💸 AIRDROP / KOL FLOW DETECTED</b>
    ${a.slice(0,10).map(x=>`
      <div class="row">
        <span class="small">${x.wallet.slice(0,6)}...</span>
        <span>${x.amount.toFixed(4)} SOL</span>
      </div>
    `).join("")}
  `;
}

/* ---------------- TOKEN VIEW ---------------- */

function renderToken(s,h){

  const top=h[0]?.pct||0;

  document.getElementById("token").classList.remove("hidden");

  document.getElementById("token").innerHTML=`
    <b>🪙 TOKEN</b>
    <div class="row"><span>Supply</span><span>${s}</span></div>
    <div class="row"><span>Holders</span><span>${h.length}</span></div>
    <div class="row"><span>Top Holder</span><span>${top.toFixed(2)}%</span></div>
  `;
}

</script>

</body>
</html>
