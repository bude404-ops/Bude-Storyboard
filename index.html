<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Board Pro</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #2c2c2c; color: white; border: 1px solid #555; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-green { background: #00e676; }
        .btn-blue { background: #2979ff; color: white; }
        .checkbox-row { margin: 10px 0; display: flex; align-items: center; }
        .ep-card { background: #1e1e1e; padding: 15px; margin: 10px 0; border: 1px solid #2979ff; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>🎬 Story Board Pro</h2>
    
    <input type="text" id="name" placeholder="Name">
    <div class="checkbox-row">
        <input type="checkbox" id="isBg" style="width: auto; margin-right: 10px;"> 
        <label for="isBg">Set as Background Character Only</label>
    </div>
    
    <button class="btn-green" onclick="saveChar()">SAVE CHARACTER</button>

    <h3>Episode Generation</h3>
    <input type="text" id="theme" placeholder="Adventure Theme...">
    <button class="btn-blue" onclick="generateScript()">GENERATE SCRIPT</button>

    <div id="epList"></div>

    <script>
        let chars = JSON.parse(localStorage.getItem('story_chars') || '[]');
        let eps = JSON.parse(localStorage.getItem('story_eps') || '[]');

        function saveChar() {
            chars.push({ 
                name: document.getElementById('name').value, 
                isBackground: document.getElementById('isBg').checked 
            });
            update();
        }

        function generateScript() {
            let leads = chars.filter(c => !c.isBackground);
            let bgs = chars.filter(c => c.isBackground);
            
            if(leads.length === 0) { alert("Add at least one lead character!"); return; }
            if(bgs.length < 2) { alert("Need at least 2 background characters!"); return; }
            
            let lead = leads[Math.floor(Math.random() * leads.length)];
            let extra1 = bgs[Math.floor(Math.random() * bgs.length)];
            let extra2 = bgs.filter(c => c !== extra1)[Math.floor(Math.random() * (bgs.length - 1))];
            
            let script = `<strong>Theme:</strong> ${document.getElementById('theme').value}<br>` +
                         `<strong>Lead:</strong> ${lead.name}<br>` +
                         `<strong>Background:</strong> ${extra1.name} & ${extra2.name} in the scene.`;
            
            eps.push(script);
            localStorage.setItem('story_eps', JSON.stringify(eps));
            render();
        }

        function update() {
            localStorage.setItem('story_chars', JSON.stringify(chars));
            render();
        }

        function render() {
            document.getElementById('epList').innerHTML = eps.map(e => `<div class="ep-card">${e}</div>`).join('');
        }
        render();
    </script>
</body>
</html>
