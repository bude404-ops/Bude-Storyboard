<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Board Pro</title>
    <style>
        body { font-family: sans-serif; background: #2c2420; color: #f4f4f4; padding: 15px; }
        .mascot-container { text-align: center; margin-bottom: 20px; }
        .mascot { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #ffd600; object-fit: cover; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #3e3632; color: white; border: 1px solid #6b5f59; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-main { background: #ffd600; color: #2c2420; }
        .btn-sec { background: #6b5f59; color: white; }
        .btn-gen { background: #2979ff; color: white; }
    </style>
</head>
<body>
    <div class="mascot-container">
        <!-- Make sure 1000013133.jpg is uploaded to your GitHub repo -->
        <img src="1000013133.jpg" class="mascot" alt="Helper Mascot" onerror="this.style.display='none'">
        <h2>Story Board Pro</h2>
    </div>
    
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="role" placeholder="Role">
    <input type="text" id="skills" placeholder="Skills">
    <input type="text" id="imgUrl" placeholder="Image URL">
    <textarea id="backstory" placeholder="Backstory"></textarea>
    
    <button class="btn-main" onclick="saveChar()">SAVE CHARACTER</button>
    <button class="btn-sec" onclick="loadPresets()">LOAD CARTOON PRESETS</button>
    <button class="btn-sec" onclick="exportData()">DOWNLOAD DATABASE</button>

    <h3>Episode Generation</h3>
    <input type="text" id="theme" placeholder="Adventure Theme...">
    <button class="btn-gen" onclick="generateScript()">GENERATE SCRIPT</button>

    <div id="epList"></div>

    <script>
        let chars = JSON.parse(localStorage.getItem('story_chars') || '[]');
        
        function loadPresets() {
            const presets = [
                {name: "Leader", role: "Brave Leader", skills: "Strategy, Courage", isBackground: false},
                {name: "Extra 1", role: "Background", skills: "Walking", isBackground: true},
                {name: "Extra 2", role: "Background", skills: "Observing", isBackground: true}
            ];
            chars = [...chars, ...presets];
            localStorage.setItem('story_chars', JSON.stringify(chars));
            alert("Presets Loaded!");
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(chars));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "cast.json");
            dl.click();
        }
        
        function saveChar() { /* ... existing save logic ... */ }
        function generateScript() { /* ... existing script logic ... */ }
    </script>
</body>
</html>
