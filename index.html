<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>BUDE Solana Forensics</title>

<style>
:root{
  --bg:#0b0f19;
  --card:#111827;
  --txt:#e5e7eb;
  --muted:#94a3b8;
  --acc:#00d4aa;
  --bad:#ef4444;
  --warn:#f59e0b;
  --line:#1f2937;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:system-ui,sans-serif;
  padding:12px;
}

h1{
  font-size:1.2rem;
  text-align:center;
  color:var(--acc);
  margin-bottom:10px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid var(--line);
  background:#0b0f19;
  color:var(--txt);
}

button{
  background:var(--acc);
  color:#000;
  font-weight:700;
  border:none;
  cursor:pointer;
}

.small{font-size:.75rem;color:var(--muted)}

.row{display:flex;justify-content:space-between;font-size:.85rem;margin:4px 0}
.bad{color:var(--bad)}
.warn{color:var(--warn)}
.ok{color:var(--acc)}

.hidden{display:none}

.list{font-size:.75rem;margin-top:8px}
.item{padding:6px 0;border-bottom:1px solid var(--line)}

.tag{
  font-size:.65rem;
  padding:2px 6px;
  border-radius:6px;
  background:#1f2937;
  margin-left:6px;
}
</style>
</head>

<body>

<h1>🧠 BUDE SOLANA FORENSICS</h1>

<!-- CA INPUT -->
<div class="card">
  <label class="small">Token Contract Address</label>
  <input id="ca" placeholder="Enter Solana CA..." />
  <button onclick="scan()">Analyze</button>
</div>

<!-- TOKEN -->
<div class="card hidden" id="tokenBox"></div>

<!-- FUNDERS -->
<div class="card hidden" id="funderBox"></div>

<!-- KOL / AIRDROP -->
<div class="card hidden" id="kolBox"></div>

<script>
const RPC="https://api.mainnet-beta.solana.com";

let STATE={
  ca:null,
  holders:[],
  funders:[],
  txEdges:[]
};

async function rpc(body){
  const r=await fetch(RPC,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  return r.json();
}

/* ---------------- TOKEN ---------------- */
async function getTokenSupply(ca){
  const j=await rpc({
    jsonrpc:"2.0",
    id:1,
    method:"getTokenSupply",
    params:[ca]
  });

  return j?.result?.value || {};
}

/* ---------------- HOLDERS ---------------- */
async function getHolders(ca){
  const j=await rpc({
    jsonrpc:"2.0",
    id:1,
    method:"getTokenLargestAccounts",
    params:[ca]
  });

  return j?.result?.value || [];
}

/* ---------------- FUNDERS (light heuristic) ---------------- */
function detectFunders(holders){
  return holders.slice(0,5).map(h=>({
    a:h.address,
    pct:parseFloat(h.uiAmount||0)
  }));
}

/* ---------------- AIRDROP / KOL DETECTION ---------------- */
function detectAirdrop(holders){

  let score=0;
  let signals=[];

  const top=holders.slice(0,5).reduce((a,b)=>a+(parseFloat(b.uiAmount||0)),0);

  if(top>60){
    score+=35;
    signals.push("HIGH EARLY CONCENTRATION");
  }

  if(holders.length>10){
    score+=15;
    signals.push("WIDE DISTRIBUTION SET");
  }

  return {score,signals};
}

/* ---------------- SCAN FLOW ---------------- */
async function scan(){

  const ca=document.getElementById("ca").value.trim();
  if(!ca) return;

  STATE.ca=ca;

  const supply=await getTokenSupply(ca);
  const holders=await getHolders(ca);

  STATE.holders=holders;
  STATE.funders=detectFunders(holders);

  renderToken(supply,holders);
  renderFunders();
  renderKOL();
}

/* ---------------- UI RENDER ---------------- */
function renderToken(supply,holders){

  const el=document.getElementById("tokenBox");
  el.classList.remove("hidden");

  const top=holders[0]?.uiAmount||0;

  let risk="LOW";
  if(top>40) risk="HIGH";
  else if(top>20) risk="MED";

  el.innerHTML=`
    <b>🪙 TOKEN OVERVIEW</b>
    <div class="row"><span>Supply</span><span>${supply.uiAmount||0}</span></div>
    <div class="row"><span>Holders</span><span>${holders.length}</span></div>
    <div class="row"><span>Top Holder</span><span>${top}%</span></div>
    <div class="row"><span>Risk</span><span class="${risk==='HIGH'?'bad':risk==='MED'?'warn':'ok'}">${risk}</span></div>
  `;
}

function renderFunders(){

  const el=document.getElementById("funderBox");
  el.classList.remove("hidden");

  el.innerHTML="<b>💰 FUNDERS</b>" +
    STATE.funders.map(f=>
      `<div class="item">${f.a}<span class="tag">${f.pct.toFixed(2)}%</span></div>`
    ).join("");
}

function renderKOL(){

  const el=document.getElementById("kolBox");
  el.classList.remove("hidden");

  const r=detectAirdrop(STATE.holders);

  const level=
    r.score>60?"🔴 HIGH AIRDROP ACTIVITY":
    r.score>30?"🟠 POSSIBLE DISTRIBUTION":
    "🟢 ORGANIC";

  el.innerHTML=`
    <b>🟣 AIRDROP / KOL SIGNAL</b>
    <div class="row"><span>Status</span><span>${level}</span></div>
    <div class="row"><span>Score</span><span>${r.score}/100</span></div>
    <div class="small">${r.signals.join("<br>")||"No signals"}</div>
  `;
}

</script>

</body>
</html>
